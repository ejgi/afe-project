name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# Permisos necesarios para leer PRs y escribir comentarios
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Token personal con permisos de escritura en el repo
          # (necesario para guardar la lista de firmantes en .signatures/cla.json)
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_TOKEN }}
        with:
          # ──────────────────────────────────────────────────────────────────
          # Ruta al archivo CLA que el contribuidor debe aceptar
          path-to-document: 'https://github.com/ejgi/afe-project/blob/main/CLA.md'

          # Dónde se guardan las firmas (se commitea automáticamente)
          path-to-signatures: '.signatures/cla.json'

          # Rama donde se guarda el JSON de firmas
          branch: 'main'

          # Mensaje que verá el contribuidor en el PR (en inglés para audiencia global)
          allowlist: ejgi,bot*

          # ──────────────────────────────────────────────────────────────────
          # Textos personalizados del bot
          # ──────────────────────────────────────────────────────────────────

          # Mensaje cuando el contribuidor NO ha firmado aún
          custom-notsigned-prolog: |
            ## ✍️ Contributor License Agreement Required

            Thank you for your Pull Request! Before it can be merged, you must
            sign the **[AFE Contributor License Agreement](https://github.com/ejgi/afe-project/blob/main/CLA.md)**.

            This is a one-time action that lets the project maintainer continue
            developing and sustaining AFE, including potential commercial versions.
            **You retain full copyright over your contribution.**

          # Texto exacto que el contribuidor debe escribir para firmar
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'

          # Mensaje de confirmación tras firmar exitosamente
          custom-allsigned-prolog: |
            ## ✅ CLA Signed — Thank You!

            All contributors have signed the CLA.
            Your Pull Request is now ready for review by the maintainer.
